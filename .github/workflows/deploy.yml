name: PicoBox CD Release Pipeline

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-binaries:
    name: Release Binaries (GoReleaser)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-picobox
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-images:
    name: Release Container Images
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve build metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          {
            echo "version=${VERSION}"
            echo "commit=${COMMIT}"
            echo "date=${DATE}"
          } >> "$GITHUB_OUTPUT"

      - name: Build & push picobox-master
        id: push-master
        uses: docker/build-push-action@v7
        with:
          context: .
          file: build/Dockerfile.master
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          cache-from: type=gha,scope=master
          cache-to: type=gha,mode=max,scope=master
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_DATE=${{ steps.meta.outputs.date }}
          tags: |
            ghcr.io/${{ github.repository }}/picobox-master:latest
            ghcr.io/${{ github.repository }}/picobox-master:${{ github.ref_name }}

      - name: Build & push picobox-web
        id: push-web
        uses: docker/build-push-action@v7
        with:
          context: .
          file: build/Dockerfile.web
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          tags: |
            ghcr.io/${{ github.repository }}/picobox-web:latest
            ghcr.io/${{ github.repository }}/picobox-web:${{ github.ref_name }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container images (keyless)
        env:
          COSIGN_EXPERIMENTAL: 'true'
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}/picobox-master@${{ steps.push-master.outputs.digest }}
          cosign sign --yes \
            ghcr.io/${{ github.repository }}/picobox-web@${{ steps.push-web.outputs.digest }}

      - name: Attest build provenance (master)
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}/picobox-master
          subject-digest: ${{ steps.push-master.outputs.digest }}
          push-to-registry: true

      - name: Attest build provenance (web)
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}/picobox-web
          subject-digest: ${{ steps.push-web.outputs.digest }}
          push-to-registry: true
