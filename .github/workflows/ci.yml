name: PicoBox CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  setup:
    name: Prepare Environment
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate Cache Key
        id: cache-key
        run: echo "key=picobox-tools-${{ runner.os }}-${{ hashFiles('scripts/versions.sh') }}" >> $GITHUB_OUTPUT

  lint:
    name: Linting
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-picobox
      - name: Run Linter
        run: ./scripts/task.sh lint

  test:
    name: Unit Tests
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-picobox
      - name: Run Tests
        run: ./scripts/task.sh test unit

  build:
    name: Build Binaries
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-picobox
      - name: Build All
        run: ./scripts/task.sh build
      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: picobox-binaries
          path: bin/

  e2e:
    name: E2E Verification
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-picobox
      - name: Download Binaries
        uses: actions/download-artifact@v4
        with:
          name: picobox-binaries
          path: bin/
      - name: Ensure permissions
        run: chmod +x bin/*
      - name: Run E2E Tests
        run: ./scripts/task.sh e2e
