name: PicoBox CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Contributors can reproduce this job locally with: ./scripts/task.sh ci
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-picobox
      - name: Environment diagnostics
        run: ./scripts/task.sh doctor
      - name: Check formatting
        run: ./scripts/task.sh fmt:check
      - name: Run linter
        run: ./scripts/task.sh lint

  # Local equivalent: ./scripts/task.sh test unit
  test:
    name: Unit Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-picobox
      - name: Run tests
        run: ./scripts/task.sh test unit

  build:
    name: Build Binaries
    runs-on: ubuntu-24.04
    outputs:
      artifact-name: picobox-binaries
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-picobox
      - name: Build
        run: ./scripts/task.sh build
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: picobox-binaries
          path: bin/
          if-no-files-found: error
          retention-days: 7

  # Local equivalent: sudo -E ./scripts/e2e.sh --skip-build (after build job locally)
  e2e:
    name: E2E Verification
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-picobox
      - name: Install WebSocket test dependency
        run: |
          python3 -m pip install --user --break-system-packages websockets \
            || pip3 install --user websockets
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: picobox-binaries
          path: bin/
      - name: Ensure executable bits
        run: chmod +x bin/picoboxd bin/picobox-master
      - name: Run E2E suite (skip rebuild)
        run: sudo -E ./scripts/e2e.sh --skip-build
