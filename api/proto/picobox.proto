syntax = "proto3";

package picobox;

option go_package = "github.com/henny-cho/picobox/internal/api/pb;picobox";

// The Agent/Daemon connects to the Master server to open a bi-directional control channel.
service AgentService {
  // ControlChannel streams metrics from the agent, and receives deployment commands from the master.
  rpc ControlChannel(stream AgentMessage) returns (stream MasterMessage) {}
}

// AgentMessage is sent from the PicoBox Daemon to the Master.
message AgentMessage {
  oneof payload {
    NodeMetrics metrics = 1;
    DeployResponse deploy_response = 2;
    StopResponse stop_response = 3;
    ExecResponse exec_response = 4;
    ContainerLog container_log = 5;
  }
}

message ContainerLog {
  string container_id = 1;
  string log_line = 2;
  bool is_stderr = 3;
}

// MasterMessage is sent from the Master to the PicoBox Daemon.
message MasterMessage {
  oneof payload {
    HeartbeatResponse heartbeat_ack = 1;
    ContainerSpec deploy_request = 2;
    StopRequest stop_request = 3;
    ExecRequest exec_request = 4;
  }
}

// NodeMetrics represents the hardware health and usage of a PicoBox node.
message NodeMetrics {
  string hostname = 1;
  float cpu_usage_percent = 2;
  uint64 memory_used_bytes = 3;
  uint64 memory_total_bytes = 4;
  float disk_io_wait = 5;
}

// HeartbeatResponse contains acknowledgments or fast commands from the Master.
message HeartbeatResponse {
  bool acknowledged = 1;
}

// ContainerSpec defines the limits and resources required to deploy a container.
message ContainerSpec {
  string container_id = 1;
  uint64 memory_max_bytes = 2; // e.g. for cgroup memory.max
  uint32 cpu_max_quota = 3;    // e.g. for cgroup cpu.max
  string rootfs_image_url = 4; // url or path to the rootfs tarball
  string command = 5;          // command to execute inside the container
}

// DeployResponse indicates the result of a deployment attempt.
message DeployResponse {
  string container_id = 1;
  bool success = 2;
  string error_message = 3;
}

// StopRequest asks the agent to terminate a specific container.
message StopRequest {
  string container_id = 1;
  bool force = 2; // e.g. SIGKILL instead of SIGTERM
}

// StopResponse indicates the result of a stop operation.
message StopResponse {
  string container_id = 1;
  bool success = 2;
  string error_message = 3;
}

message ExecRequest {
  string container_id = 1;
  string command = 2;
}

message ExecResponse {
  string container_id = 1;
  string output = 2;
  bool success = 3;
  string error_message = 4;
}
