syntax = "proto3";

package picobox;

option go_package = "github.com/henny-cho/picobox/api/gen/go;picobox";

// The Agent/Daemon sends health metrics to the Master server periodically.
service AgentService {
  // Heartbeat streams node metrics from the daemon to the master.
  rpc Heartbeat(stream NodeMetrics) returns (HeartbeatResponse) {}
}

// The Master server controls the agents by issuing deployment commands.
service MasterService {
  // DeployContainer directs the agent to deploy a new container based on the spec.
  rpc DeployContainer(ContainerSpec) returns (DeployResponse) {}
}

// NodeMetrics represents the hardware health and usage of a PicoBox node.
message NodeMetrics {
  string hostname = 1;
  float cpu_usage_percent = 2;
  uint64 memory_used_bytes = 3;
  uint64 memory_total_bytes = 4;
  float disk_io_wait = 5;
}

// HeartbeatResponse contains acknowledgments or fast commands from the Master.
message HeartbeatResponse {
  bool acknowledged = 1;
}

// ContainerSpec defines the limits and resources required to deploy a container.
message ContainerSpec {
  string container_id = 1;
  uint64 memory_max_bytes = 2; // e.g. for cgroup memory.max
  uint32 cpu_max_quota = 3;    // e.g. for cgroup cpu.max
  string rootfs_image_url = 4; // url or path to the rootfs tarball
}

// DeployResponse indicates the result of a deployment attempt.
message DeployResponse {
  bool success = 1;
  string error_message = 2;
}
